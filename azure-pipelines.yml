# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  name: default

variables:
- name: DEV_ENVIRONMENT
  value: dev 

stages:

# =========================
# Stage 1: Validate
# =========================
- stage: TerraformValidate
  jobs:
  - job: TerraformValidateJob
    steps:
    - checkout: self

    - script: terraform version
      displayName: Check Terraform Version

    - task: AzureCLI@2
      displayName: Terraform Init & Validate
      inputs:
        azureSubscription: terraform-aks-azurerm-svc-con
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd $(System.DefaultWorkingDirectory)/terraform-manifests

          echo "Current directory:"
          pwd
          ls -lrt

          az account show

          terraform init -reconfigure \
            -backend-config="resource_group_name=terraform-storage-rg" \
            -backend-config="storage_account_name=goginenistorage" \
            -backend-config="container_name=tfstatefiles" \
            -backend-config="key=aks-$(DEV_ENVIRONMENT).tfstate"

          chmod -R +x .terraform/providers || true

          terraform validate

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: $(System.DefaultWorkingDirectory)/terraform-manifests
        artifact: terraform-manifests-out


# =========================
# Stage 2: Deploy
# =========================
- stage: DeployAKSClusters
  dependsOn: TerraformValidate

  jobs:
  - deployment: DeployDevAKSCluster
    pool:
      name: default
    environment: $(DEV_ENVIRONMENT)

    strategy:
      runOnce:
        deploy:
          steps:

          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: terraform-manifests-out
              path: $(Pipeline.Workspace)/terraform-manifests

          - task: DownloadSecureFile@1
            name: sshkey
            inputs:
              secureFile: 'aks-terraform-devops-ssh-key-ububtu.pub'

          - script: terraform version

          - task: AzureCLI@2
            displayName: Terraform Plan
            inputs:
              azureSubscription: terraform-aks-azurerm-svc-con
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd $(Pipeline.Workspace)/terraform-manifests

                echo "Current directory:"
                pwd
                ls -lrt

                az account show

                terraform init -reconfigure \
                  -backend-config="resource_group_name=terraform-storage-rg" \
                  -backend-config="storage_account_name=goginenistorage" \
                  -backend-config="container_name=tfstatefiles" \
                  -backend-config="key=aks-$(DEV_ENVIRONMENT).tfstate"

                chmod -R +x .terraform/providers || true

                terraform plan \
                  -var ssh_public_key=$(sshkey.secureFilePath) \
                  -var environment=$(DEV_ENVIRONMENT) \
                  -out=tfplan

          - task: AzureCLI@2
            displayName: Terraform Apply
            inputs:
              azureSubscription: terraform-aks-azurerm-svc-con
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd $(Pipeline.Workspace)/terraform-manifests
                terraform apply -auto-approve tfplan
          - script: |
              echo -e "\033[1;32m==============================\033[0m"
              echo -e "\033[1;34m   🚀 JAI GIREEESH 🚀\033[0m"
              echo -e "\033[1;32m==============================\033[0m"
            displayName: Celebrate Success 🎉     